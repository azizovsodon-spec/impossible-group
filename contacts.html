<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Impossible Group | IT Academy Khujand</title>

<meta name="description" content="Impossible Group — ведущая IT-академия и команда разработчиков в Худжанде. Обучение Web-дизайну и разработке.">

<meta name="keywords" content="IT Academy Khujand, Impossible Group, обучение программированию Таджикистан, веб-дизайн Худжанд">
        <link rel="icon" type="" href="IMG/logo.png">    
    
    <title>Impossible Group | IT Academy</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты | NEXT.DEV</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0066ff;
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --bg-light: #f5f5f7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-light); 
            color: var(--text-main); 
            overflow-x: hidden;
        }

        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,102,255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,102,255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1; pointer-events: none;
        }
        #cursor { width: 20px; height: 20px; background: var(--primary); border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000; transition: transform 0.1s; }
        #cursor-blur { width: 200px; height: 200px; background: rgba(0, 102, 255, 0.1); border-radius: 50%; position: fixed; filter: blur(60px); pointer-events: none; z-index: 9999; }

        header {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: space-between;
            align-items: center; padding: 15px 8%;
        }

        .logo { font-size: 22px; font-weight: 800; color: var(--primary); letter-spacing: -1px; text-decoration: none; }
        nav { display: flex; align-items: center; }
        nav a { text-decoration: none; color: var(--text-main); margin: 0 15px; font-weight: 500; font-size: 14px; opacity: 0.8; transition: 0.1s; }
        nav a:hover { opacity: 1; color: var(--primary); }

        .search-box {
            display: flex; align-items: center; background: rgba(0,0,0,0.05);
            padding: 8px 15px; border-radius: 50px; margin-left: 10px;
        }
        .search-box input { border: none; background: transparent; outline: none; font-size: 13px; width: 120px; transition: 0.1s; }

        .container { padding: 140px 8% 80px; max-width: 1200px; margin: 0 auto; }
        .reveal { opacity: 0; transform: translateY(30px); transition: 0.8s cubic-bezier(0.2, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 60px;
            background: white;
            padding: 60px;
            border-radius: 50px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .contact-info h1 { font-size: 56px; font-weight: 900; letter-spacing: -3px; margin-bottom: 20px; line-height: 1; }
        .contact-info p { color: var(--text-sub); margin-bottom: 40px; font-size: 18px; }

        .info-item { margin-bottom: 30px; }
        .info-item h4 { font-size: 12px; text-transform: uppercase; color: var(--primary); letter-spacing: 2px; margin-bottom: 5px; font-weight: 800; }
        .info-item p { color: var(--text-main); font-weight: 600; font-size: 22px; }

        .contact-form { display: flex; flex-direction: column; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 14px; font-weight: 600; opacity: 0.7; }
        
        input, textarea {
            padding: 20px; border-radius: 20px; border: 1px solid transparent;
            background: #f5f5f7; font-family: inherit; font-size: 16px; transition: 0.3s;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); background: white; }

        .btn-send {
            background: var(--primary); color: white; padding: 22px;
            border-radius: 20px; border: none; font-size: 17px; font-weight: 800;
            transition: 0.3s; margin-top: 10px;
        }

        footer { padding: 60px 8%; text-align: center; color: var(--text-sub); font-size: 14px; }
    </style>
</head>
<body>

<div class="bg-grid"></div>
<div id="cursor"></div>
<div id="cursor-blur"></div>

<header>
    <a href="index.html" class="logo">NEXT.DEV</a>
    <nav>
        <a href="index.html">Главная</a>
        <a href="istori.html">История</a>
        <a href="news.html">Новости</a>
        <a href="courses.html">Курсы</a>
        <a href="contacts.html" style="color: var(--primary); opacity: 1;">Контакты</a>
        <div class="search-box">
            <span>🔍</span>
            <input type="text" placeholder="Поиск...">
        </div>
    </nav>
</header>

<div class="container reveal">
    <div class="contact-wrapper">
        <div class="contact-info">
            <h1>Свяжись со мной</h1>
            <p>Напиши здесь, и я получу уведомление в Telegram мгновенно.</p>
            <div class="info-item"><h4>Локация</h4><p>г. Худжанд, Таджикистан</p></div>
            <div class="info-item"><h4>Статус бота</h4><p id="bot-status" style="color: green;">Бот активен ✅</p></div>
        </div>

        <form class="contact-form" id="tgForm">
            <div class="form-group"><label>Твое имя</label><input type="text" id="name" placeholder="Введите имя" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="mail@example.com" required></div>
            <div class="form-group"><label>Сообщение</label><textarea id="message" rows="5" placeholder="Ваш вопрос..."></textarea></div>
            <button type="submit" class="btn-send" id="submitBtn">Отправить в Telegram</button>
        </form>
    </div>
</div>

<footer>© 2026 NEXT.DEV Academy. Сделано в Худжанде.</footer>

<script>
    // --- КУРСОР ---
    const cursor = document.getElementById("cursor");
    const blur = document.getElementById("cursor-blur");
    document.addEventListener("mousemove", (e) => {
        cursor.style.left = e.x - 10 + "px"; cursor.style.top = e.y - 10 + "px";
        blur.style.left = e.x - 100 + "px"; blur.style.top = e.y - 100 + "px";
    });

    window.addEventListener('DOMContentLoaded', () => { document.querySelector('.reveal').classList.add('active'); });

    document.querySelectorAll('a, button, input, textarea').forEach(elem => {
        elem.addEventListener('mouseenter', () => cursor.style.transform = "scale(2.5)");
        elem.addEventListener('mouseleave', () => cursor.style.transform = "scale(1)");
    });

    // --- ЛОГИКА ТЕЛЕГРАМА (ТВОИ ДАННЫЕ ВШИТЫ) ---
    const TOKEN = "8722765200:AAG373Xov1f3VaJdqfZZmX6BQoRc_fxKQFg"; 
    const CHAT_ID = "5932685938"; 

    document.getElementById('tgForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "Отправляю...";
        btn.disabled = true;

        let msg = `<b>🔥 Новая заявка!</b>\n`;
        msg += `<b>Имя:</b> ${document.getElementById('name').value}\n`;
        msg += `<b>Email:</b> ${document.getElementById('email').value}\n`;
        msg += `<b>Вопрос:</b> ${document.getElementById('message').value}`;

        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                parse_mode: 'html',
                text: msg
            })
        })
        .then(res => {
            if(res.ok) {
                alert("✅ Бро, сообщение пришло! Проверь Телеграм.");
                this.reset(); // ОЧИСТКА ПОЛЕЙ
            } else {
                alert("❌ Ошибка! Проверь, нажал ли ты START в боте.");
            }
        })
        .catch(err => alert("❌ Ошибка сети."))
        .finally(() => {
            btn.innerText = "Отправить в Telegram";
            btn.disabled = false;
        });
    });
</script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script src="chat.js"></script>

</body>
</html>
